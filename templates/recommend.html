<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Recommender</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <a class="navbar-brand" href="/">
                BookMania
            </a>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="/recommends">Recommend</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <div class="container">

        <h1 class="main-title text-center">
            Find Your Next Favorite Book
        </h1>

        <form action="/recommend_books" method="post" class="search-form">

            <input
                name="user_input"
                type="text"
                class="form-control search-input"
                placeholder="Enter a book name..."
                required
            >

            <button type="submit" class="btn search-btn">
                Recommend
            </button>

        </form>

        {% if data %}

        <div class="row g-4 mt-4">

            {% for i in data %}

            <div class="col-lg-3 col-md-4 col-sm-6">

                <div class="book-card">

                    <img
    class="book-image"
    src="{{ i[2] if i[2] else 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=800' }}"
    alt="Book Image"
    loading="lazy"

    onerror="
        this.onerror=null;
        this.src='https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=800';
    "
>

                    <div class="card-body">

                        <div class="book-title">
                            {{ i[0] }}
                        </div>

                        <div class="author">
                            {{ i[1] }}
                        </div>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

        {% endif %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
